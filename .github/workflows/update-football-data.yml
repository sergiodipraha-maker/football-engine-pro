name: Update football data

on:
  workflow_dispatch:
  schedule:
    - cron: "17 6,18 * * *"

permissions:
  contents: write

jobs:
  update-football-data:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Fetch real football fixtures and odds
        env:
          ODDS_API_KEY: ${{ secrets.ODDS_API_KEY }}
        run: |
          python - <<'PY'
          import json
          import os
          import time
          from datetime import datetime, timezone
          from pathlib import Path
          from urllib.parse import urlencode
          from urllib.request import Request, urlopen
          from urllib.error import HTTPError, URLError

          API_HOST = "https://api.the-odds-api.com/v4"
          API_KEY = os.environ.get("ODDS_API_KEY")

          if not API_KEY:
              raise RuntimeError("ODDS_API_KEY secret is missing")

          PRIORITY_LEAGUES = [
              "soccer_epl",
              "soccer_efl_champ",
              "soccer_spain_la_liga",
              "soccer_italy_serie_a",
              "soccer_germany_bundesliga",
          ]

          def get_json(url):
              request = Request(
                  url,
                  headers={"User-Agent": "FootballEnginePRO/1.0"},
              )
              with urlopen(request, timeout=40) as response:
                  body = response.read().decode("utf-8")
                  return json.loads(body), dict(response.headers)

          def median(values):
              values = sorted(values)
              count = len(values)

              if not count:
                  return None

              if count % 2:
                  return values[count // 2]

              return (
                  values[count // 2 - 1]
                  + values[count // 2]
              ) / 2

          sports_url = (
              f"{API_HOST}/sports/?"
              + urlencode({"apiKey": API_KEY})
          )

          sports, _ = get_json(sports_url)

          available = {
              sport["key"]: sport
              for sport in sports
              if sport.get("group") == "Soccer"
              and sport.get("active")
              and not sport.get("has_outrights")
          }

          selected_leagues = [
              available[key]
              for key in PRIORITY_LEAGUES
              if key in available
          ]

          if not selected_leagues:
              raise RuntimeError(
                  "No active priority football leagues were found"
              )

          events = []
          quota = {}

          for sport in selected_leagues:
              params = {
                  "apiKey": API_KEY,
                  "regions": "uk",
                  "markets": "h2h",
                  "oddsFormat": "decimal",
                  "dateFormat": "iso",
              }

              odds_url = (
                  f"{API_HOST}/sports/{sport['key']}/odds/?"
                  + urlencode(params)
              )

              try:
                  rows, headers = get_json(odds_url)
              except HTTPError as error:
                  print(
                      f"HTTP error for {sport['key']}: "
                      f"{error.code} {error.reason}"
                  )
                  continue
              except URLError as error:
                  print(
                      f"Network error for {sport['key']}: "
                      f"{error.reason}"
                  )
                  continue

              quota = {
                  "remaining": headers.get(
                      "x-requests-remaining"
                  ),
                  "used": headers.get(
                      "x-requests-used"
                  ),
                  "last": headers.get(
                      "x-requests-last"
                  ),
              }

              for event in rows:
                  prices = {}

                  for bookmaker in event.get(
                      "bookmakers",
                      [],
                  ):
                      market = next(
                          (
                              item
                              for item in bookmaker.get(
                                  "markets",
                                  [],
                              )
                              if item.get("key") == "h2h"
                          ),
                          None,
                      )

                      if not market:
                          continue

                      for outcome in market.get(
                          "outcomes",
                          [],
                      ):
                          price = outcome.get("price")
                          name = outcome.get("name")

                          if (
                              name
                              and isinstance(
                                  price,
                                  (int, float),
                              )
                              and price > 1
                          ):
                              prices.setdefault(
                                  name,
                                  [],
                              ).append(float(price))

                  picks = []

                  for name, values in prices.items():
                      middle = median(values)

                      spread = (
                          (
                              max(values)
                              - min(values)
                          ) / middle
                          if middle and len(values) > 1
                          else 0
                      )

                      if name == event.get("home_team"):
                          selection_type = "home"
                      elif name == event.get("away_team"):
                          selection_type = "away"
                      else:
                          selection_type = "draw"

                      picks.append({
                          "selection": name,
                          "selection_type": selection_type,
                          "odds": round(max(values), 3),
                          "median_odds": round(middle, 3),
                          "bookmaker_count": len(values),
                          "consensus_spread": round(
                              spread,
                              4,
                          ),
                      })

                  if picks:
                      events.append({
                          "id": event["id"],
                          "sport_key": sport["key"],
                          "league": sport.get(
                              "title",
                              sport["key"],
                          ),
                          "commence_time": event[
                              "commence_time"
                          ],
                          "home_team": event["home_team"],
                          "away_team": event["away_team"],
                          "picks": picks,
                      })

              time.sleep(0.2)

          events.sort(
              key=lambda item: item["commence_time"]
          )

          output = {
              "generated_at": datetime.now(
                  timezone.utc
              ).isoformat(),
              "provider": "The Odds API",
              "regions": "uk",
              "markets": ["h2h"],
              "leagues": [
                  league["key"]
                  for league in selected_leagues
              ],
              "event_count": len(events),
              "events": events,
              "quota": quota,
              "error": None,
          }

          output_path = Path(
              "data/live-matches.json"
          )

          output_path.parent.mkdir(
              parents=True,
              exist_ok=True,
          )

          output_path.write_text(
              json.dumps(
                  output,
                  ensure_ascii=False,
                  indent=2,
              ),
              encoding="utf-8",
          )

          print(
              f"Saved {len(events)} real football events"
          )
          print(f"API quota: {quota}")
          PY

      - name: Commit updated football data
        run: |
          git config user.name "football-engine-bot"
          git config user.email "actions@users.noreply.github.com"
          git add data/live-matches.json
          git diff --cached --quiet && exit 0
          git commit -m "Update real football data"
          git push
